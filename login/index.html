<!DOCTYPE html><html lang="id"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login - Uang Masuk</title><meta name="description" content="Login ke aplikasi Uang Masuk. Kelola keuangan usaha kecil Anda dengan mudah."><link rel="stylesheet" href="../css/style.css"><link rel="manifest" href="../manifest.json"><link rel="icon" type="image/svg+xml" href="../image/logo.svg"><link rel="apple-touch-icon" href="../image/logo.svg"><meta name="theme-color" content="#ffffff"><meta name="apple-mobile-web-app-capable" content="yes"><div class="login-page"><div class="login-card"><div class="login-header"><h1>Masuk Akun</h1><p>Uang Masuk</div><form id="loginForm"><div class="form-group"><label class="form-label" for="usernameInput">Username</label> <input id="usernameInput" class="form-control" placeholder="demo" required autocomplete="username"></div><div class="form-group"><label class="form-label" for="passwordInput">Password</label><div style="position:relative"><input type="password" id="passwordInput" class="form-control" placeholder="demo123" required autocomplete="current-password"> <button type="button" id="togglePwd" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:0 0;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;padding:4px;transition:color .2s" title="Tampilkan/Sembunyikan Sandi"><svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path id="eyeOpen" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle id="eyeCircle" cx="12" cy="12" r="3"></circle><line id="eyeSlash" x1="1" y1="1" x2="23" y2="23" style="display:none"></line></svg></button></div></div><div id="loginError" style="display:none;background:var(--danger-bg);color:var(--danger);padding:10px 14px;border-radius:var(--radius);font-size:.82rem;margin-bottom:14px;border-left:3px solid var(--danger)"></div><button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">Masuk</button></form><p style="text-align:center;margin-top:32px;font-size:.78rem;color:var(--text-muted);opacity:.8">&copy; 2026 Uang Masuk</div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="../js/supabase.js"></script><script src="../js/db-api.js"></script><script src="../js/utils.js"></script><script src="../js/auth.js"></script><script>document.addEventListener("DOMContentLoaded",()=>{"function"==typeof redirectIfLoggedIn&&redirectIfLoggedIn(),document.getElementById("togglePwd").addEventListener("click",()=>{const e=document.getElementById("passwordInput"),t=document.getElementById("eyeSlash");"password"===e.type?(e.type="text",t.style.display="block"):(e.type="password",t.style.display="none")}),document.getElementById("loginForm").addEventListener("submit",async e=>{e.preventDefault();const t=document.getElementById("usernameInput").value.trim(),n=document.getElementById("passwordInput").value,s=document.getElementById("loginBtn"),d=document.getElementById("loginError");s.disabled=!0,s.textContent="Memproses...",d.style.display="none";const o=await login(t,n);o.success?(showToast("Login berhasil! Mengalihkan...","success"),setTimeout(()=>{const e=o.redirect?"../"+o.redirect.replace(".html","/"):"../dashboard/";window.location.href=e},800)):(d.innerHTML=o.message||"Username atau password salah.",d.style.display="block",s.disabled=!1,s.textContent="Masuk")})})</script>
